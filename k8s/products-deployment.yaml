apiVersion: apps/v1
kind: Deployment
metadata:
  name: products-deployment
  namespace: microapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: products
  template:
    metadata:
      labels:
        app: products
    spec:
      containers:
      - name: products
        image: xsonts/microproductos:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5003
        env:
        - name: CONSUL_HOST
          value: "consul-svc"
        - name: SERVICE_NAME
          value: "products-service"
        - name: SERVICE_PORT
          value: "5003"
        - name: SERVICE_HOST
          value: "microproductos"
        - name: MYSQL_HOST
          value: "db-products-svc"
        - name: MYSQL_USER
          value: "root"
        - name: MYSQL_PASSWORD
          value: "root"
        - name: MYSQL_DB
          value: "productos"
---
apiVersion: v1
kind: Service
metadata:
  name: products-svc
  namespace: microapp
spec:
  selector:
    app: products
  ports:
  - port: 5003
    targetPort: 5003
  type: ClusterIP