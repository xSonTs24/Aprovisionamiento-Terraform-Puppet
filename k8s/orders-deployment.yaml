apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-deployment
  namespace: microapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
      - name: orders
        image: xsonts/microorders:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5004
        env:
        - name: CONSUL_HOST
          value: "consul-svc"
        - name: MYSQL_HOST
          value: "db-orders-svc"
        - name: MYSQL_USER
          value: "root"
        - name: MYSQL_PASSWORD
          value: "root"
        - name: MYSQL_DB
          value: "ordersdb"
---
apiVersion: v1
kind: Service
metadata:
  name: orders-svc
  namespace: microapp
spec:
  selector:
    app: orders
  ports:
  - port: 5004
    targetPort: 5004
  type: ClusterIP