apiVersion: v1
kind: ConfigMap
metadata:
  name: db-users-init
  namespace: microapp
data:
  init.sql: |
    CREATE DATABASE myflaskapp;
    use myflaskapp;
    CREATE TABLE users (
        id int NOT NULL AUTO_INCREMENT PRIMARY KEY,
        name varchar(255),
        email varchar(255),
        username varchar(255),
        password varchar(255)
    );
    INSERT INTO users VALUES(null, "juan", "juan@gmail.com", "juan", "123"),
        (null, "maria", "maria@gmail.com", "maria", "456");
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-users
  namespace: microapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-users
  template:
    metadata:
      labels:
        app: db-users
    spec:
      containers:
      - name: db-users
        image: mysql:5.7
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "root"
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: init-sql
        configMap:
          name: db-users-init
---
apiVersion: v1
kind: Service
metadata:
  name: db-users-svc
  namespace: microapp
spec:
  selector:
    app: db-users
  ports:
  - port: 3306
    targetPort: 3306
---
